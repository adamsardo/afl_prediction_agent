services:
  postgres:
    image: postgres:16
    container_name: afl-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afl_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - afl_agent_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d afl_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  afl_agent_postgres_data:

